[alembic]
script_location = migrations
prepend_sys_path = .
# URL lida da variável de ambiente DATABASE_URL (migrations/env.py trata a conversão asyncpg→psycopg2)
# Fallback local para desenvolvimento sem Docker:
#   postgresql+psycopg2://kraft:kraft@localhost:5432/kraft
sqlalchemy.url = postgresql://squarecloud:BQEiEG1HEdXflBWRSw79HKhV@square-cloud-db-575e056adae84cd49304044ac1781369.squareweb.app:7193?sslmode=require

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
