[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = postgresql://squarecloud:BQEiEG1HEdXflBWRSw79HKhV@square-cloud-db-575e056adae84cd49304044ac1781369.squareweb.app:7193

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
