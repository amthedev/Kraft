<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kraft — Entrar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            kraft: { bg:'#0d0d0f', surface:'#18181c', border:'#2a2a30', accent:'#7c3aed', accent2:'#a855f7', text:'#e2e2e8', muted:'#6b6b78' }
          },
          fontFamily: { mono: ['JetBrains Mono','Fira Code','monospace'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <style>
    body { background-color: #0d0d0f; color: #e2e2e8; font-family: 'JetBrains Mono', monospace; }
    .glow { background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 65%); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Background glow -->
  <div class="glow absolute inset-0 pointer-events-none"></div>

  <!-- Grid texture -->
  <div class="absolute inset-0 pointer-events-none opacity-[0.03]"
    style="background-image: linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px); background-size: 40px 40px;">
  </div>

  <div class="relative w-full max-w-sm px-4" x-data="authPage('{{ tab }}')">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-violet-600 to-purple-900 flex items-center justify-center shadow-2xl shadow-violet-900/50 mb-4">
        <span class="text-white font-bold text-2xl">K</span>
      </div>
      <h1 class="text-xl font-bold text-kraft-text">Kraft</h1>
      <p class="text-xs text-kraft-muted mt-1">Game Creation OS</p>
    </div>

    <!-- Card -->
    <div class="bg-kraft-surface border border-kraft-border rounded-2xl overflow-hidden shadow-2xl">

      <!-- Tabs -->
      <div class="flex border-b border-kraft-border">
        <button @click="tab = 'login'; error = ''"
          class="flex-1 py-3.5 text-sm font-medium transition-colors relative"
          :class="tab === 'login' ? 'text-kraft-text' : 'text-kraft-muted hover:text-kraft-text'">
          Entrar
          <div x-show="tab === 'login'" class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-violet-600 to-purple-500"></div>
        </button>
        <button @click="tab = 'register'; error = ''"
          class="flex-1 py-3.5 text-sm font-medium transition-colors relative"
          :class="tab === 'register' ? 'text-kraft-text' : 'text-kraft-muted hover:text-kraft-text'">
          Cadastrar
          <div x-show="tab === 'register'" class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-violet-600 to-purple-500"></div>
        </button>
      </div>

      <div class="p-8">

        <!-- Error message -->
        <div x-show="error" x-cloak
          class="flex items-start gap-3 mb-5 px-4 py-3 bg-red-500/10 border border-red-500/20 rounded-xl border-l-2 border-l-red-500">
          <svg class="w-4 h-4 text-red-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <p class="text-red-400 text-sm" x-text="error"></p>
        </div>

        <!-- Success message -->
        <div x-show="success" x-cloak
          class="flex items-start gap-3 mb-5 px-4 py-3 bg-green-500/10 border border-green-500/20 rounded-xl">
          <svg class="w-4 h-4 text-green-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          <p class="text-green-400 text-sm" x-text="success"></p>
        </div>

        <form @submit.prevent="submit" class="space-y-4">

          <!-- Username (só no cadastro) -->
          <div x-show="tab === 'register'">
            <label class="block text-xs text-kraft-muted mb-1.5">Username</label>
            <input x-model="form.username" type="text" placeholder="seu_username"
              class="w-full bg-kraft-bg border border-kraft-border rounded-xl px-4 py-3 text-sm text-kraft-text focus:outline-none focus:border-kraft-accent focus:ring-1 focus:ring-kraft-accent/30 transition-colors placeholder-kraft-muted" />
          </div>

          <!-- Email -->
          <div>
            <label class="block text-xs text-kraft-muted mb-1.5">E-mail</label>
            <input x-model="form.email" type="email" placeholder="seu@email.com"
              class="w-full bg-kraft-bg border border-kraft-border rounded-xl px-4 py-3 text-sm text-kraft-text focus:outline-none focus:border-kraft-accent focus:ring-1 focus:ring-kraft-accent/30 transition-colors placeholder-kraft-muted" />
          </div>

          <!-- Senha -->
          <div>
            <label class="block text-xs text-kraft-muted mb-1.5">Senha</label>
            <input x-model="form.password" type="password" placeholder="••••••••"
              class="w-full bg-kraft-bg border border-kraft-border rounded-xl px-4 py-3 text-sm text-kraft-text focus:outline-none focus:border-kraft-accent focus:ring-1 focus:ring-kraft-accent/30 transition-colors placeholder-kraft-muted" />
          </div>

          <!-- Submit -->
          <button type="submit" :disabled="loading"
            class="w-full bg-gradient-to-r from-violet-600 to-purple-600 hover:from-violet-500 hover:to-purple-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium py-3 rounded-xl transition-all text-sm mt-2 flex items-center justify-center gap-2">
            <div x-show="loading" class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            <span x-show="!loading && tab === 'login'">Entrar</span>
            <span x-show="!loading && tab === 'register'">Criar conta</span>
            <span x-show="loading">Aguarde...</span>
          </button>

        </form>

        <!-- Link troca de tab -->
        <p class="text-center text-xs text-kraft-muted mt-5">
          <span x-show="tab === 'login'">
            Não tem conta?
            <button @click="tab = 'register'; error = ''" class="text-kraft-accent hover:text-kraft-accent2 transition-colors">Cadastre-se</button>
          </span>
          <span x-show="tab === 'register'">
            Já tem conta?
            <button @click="tab = 'login'; error = ''" class="text-kraft-accent hover:text-kraft-accent2 transition-colors">Entre aqui</button>
          </span>
        </p>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-kraft-muted/40 text-xs mt-6">v0.1.0 · Kraft Platform</p>
  </div>

<script>
function authPage(initialTab) {
  return {
    tab: initialTab || 'login',
    form: { email: '', password: '', username: '' },
    loading: false,
    error: '',
    success: '',

    async submit() {
      this.error = ''
      this.success = ''
      this.loading = true

      try {
        const isLogin = this.tab === 'login'
        const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register'
        const body = isLogin
          ? { email: this.form.email, password: this.form.password }
          : { email: this.form.email, username: this.form.username, password: this.form.password }

        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        })

        const data = await res.json()

        if (!res.ok) {
          this.error = data.detail || 'Erro ao autenticar'
          return
        }

        if (isLogin) {
          localStorage.setItem('kraft_token', data.access_token)
          window.location.href = '/'
        } else {
          this.tab = 'login'
          this.form.username = ''
          this.form.password = ''
          this.success = 'Conta criada com sucesso! Faça login para continuar.'
        }
      } catch {
        this.error = 'Erro de conexão. Tente novamente.'
      } finally {
        this.loading = false
      }
    }
  }
}
</script>
</body>
</html>
